<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario + Tabla + Hobbies</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }

        tr:hover {
            background-color: #eeeeee;
            cursor: pointer;
        }

        .hobbies {
            margin-top: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Formulario</h2>

<form id="formulario">

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre"><br><br>

    <label for="apellidos">Apellidos:</label>
    <input type="text" id="apellidos"><br><br>

    <label for="edad">Edad:</label>
    <input type="number" id="edad" min="0" max="110"><br><br>

    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad"><br><br>

    <div class="hobbies">
        <strong>Hobbies:</strong><br><br>

        <input type="checkbox" name="hobbies[]" value="Deporte"> Deporte
        <input type="checkbox" name="hobbies[]" value="Lectura"> Lectura
        <input type="checkbox" name="hobbies[]" value="Música"> Música
        <input type="checkbox" name="hobbies[]" value="Juegos"> Juegos
        <input type="checkbox" name="hobbies[]" value="Cine"> Cine
        <input type="checkbox" name="hobbies[]" value="Teatro"> Teatro
        <input type="checkbox" name="hobbies[]" value="Coleccionismo"> Coleccionismo
        <input type="checkbox" name="hobbies[]" value="Bricolaje"> Bricolaje
        <input type="checkbox" name="hobbies[]" value="Cosplay"> Cosplay
    </div>

    <button type="submit">Añadir</button>
</form>

<h2>Tabla</h2>

<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
        <th>Hobbies</th>
    </tr>
    </thead>

    <tbody id="tablaDatos">
    </tbody>
</table>

<script>

    $(document).ready(function(){

        var listaPersonas = [];

        $("#formulario").submit(function(e){
            e.preventDefault();

            var nombre = $("#nombre").val();
            var apellidos = $("#apellidos").val();
            var edad = $("#edad").val();
            var ciudad = $("#ciudad").val();

            // Obtener hobbies seleccionados
            var hobbies = $('input[name="hobbies[]"]')
                .filter(':checked')
                .map(function () {
                    return $(this).val();
                })
                .get();

            // Validaciones
            if (nombre === "") {
                alert("El campo nombre es obligatorio");
                return;
            }

            if (apellidos === "") {
                alert("El campo apellidos es obligatorio");
                return;
            }

            if (edad === "") {
                alert("El campo edad es obligatorio");
                return;
            }

            if (edad < 0 || edad > 110) {
                alert("La edad debe estar entre 0 y 110");
                return;
            }

            if (ciudad === "") {
                alert("El campo ciudad es obligatorio");
                return;
            }

            if (edad < 0) {
                alert("La edad no puede ser negativa");
                return;
            }

            // Crear objeto
            var persona = {
                nombre: nombre,
                apellidos: apellidos,
                edad: parseInt(edad),
                ciudad: ciudad,
                hobbies: hobbies
            };

            // Añadir al array
            listaPersonas.push(persona);

            // Serializar
            var jsonTexto = JSON.stringify(listaPersonas);

            // Generar tabla
            generarTabla(jsonTexto);

            // Limpiar formulario
            $("#formulario")[0].reset();
        });

        // Generar tabla completa
        function generarTabla(json) {

            var lista = JSON.parse(json);

            $("#tablaDatos").html("");

            lista.forEach(function(persona, indice){

                var fila = generarTR(persona, indice);

                $("#tablaDatos").append(fila);
            });
        }

        // Crear fila
        function generarTR(persona, indice) {

            var tr = $("<tr>");

            tr.append($("<td>").text(persona.nombre));
            tr.append($("<td>").text(persona.apellidos));
            tr.append($("<td>").text(persona.edad));
            tr.append($("<td>").text(persona.ciudad));

            // Mostrar hobbies separados por coma
            tr.append($("<td>").text(persona.hobbies.join(", ")));

            // Eliminar fila al hacer click
            tr.click(function(){

                listaPersonas.splice(indice, 1);

                var jsonTexto = JSON.stringify(listaPersonas);

                generarTabla(jsonTexto);
            });

            return tr;
        }

    });

</script>

</body>
</html>
