<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario + Tabla</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>

<h2>Formulario</h2>

<form id="formulario">

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre"><br><br>

    <label for="apellidos">Apellidos:</label>
    <input type="text" id="apellidos"><br><br>

    <label for="edad">Edad:</label>
    <input type="number" id="edad"><br><br>

    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad"><br><br>

    <button type="submit">Añadir</button>
</form>

<h2>Tabla</h2>

<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody id="tablaDatos">
    </tbody>
</table>

<script>

    $(document).ready(function(){

        $("#formulario").submit(function(e){
            e.preventDefault();

            var nombre = $("#nombre").val();
            var apellidos = $("#apellidos").val();
            var edad = $("#edad").val();
            var ciudad = $("#ciudad").val();

            // Validación edad
            if (edad < 0) {
                alert("La edad no puede ser negativa");
                return;
            }

            // Crear objeto
            var persona = {
                nombre: nombre,
                apellidos: apellidos,
                edad: edad,
                ciudad: ciudad
            };

            // Serializar y deserializar
            var jsonTexto = JSON.stringify(persona);
            var objeto = JSON.parse(jsonTexto);

            // Crear fila
            var fila = crearFila(objeto);

            // Añadir a tabla
            $("#tablaDatos").append(fila);

            // Limpiar formulario
            $("#formulario")[0].reset();
        });

    });

    // Función que crea la fila
    function crearFila(obj) {

        var tr = $("<tr>");

        var tdNombre = $("<td>").text(obj.nombre);
        var tdApellidos = $("<td>").text(obj.apellidos);
        var tdEdad = $("<td>").text(obj.edad);
        var tdCiudad = $("<td>").text(obj.ciudad);

        tr.append(tdNombre);
        tr.append(tdApellidos);
        tr.append(tdEdad);
        tr.append(tdCiudad);

        return tr;
    }

</script>

</body>
</html>
