<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perros API</title>

    <!-- Bootstrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #fffff;
            text-align: center;
            padding: 30px;
        }

        img {
            margin-top: 20px;
            max-width: 400px;
            border-radius: 10px;
        }

        #imagen {
            max-width: 100%;
            height: 200px;
        }

    </style>
</head>

<body>

<h1>Galería de Perros</h1>

<!-- Botón -->
<button id="btnAleatorio" class="btn btn-primary m-2">
    Aleatorio
</button>

<style>
    #btnAleatorio {
        background-color: #4af3c6;
        color: #050505;
    }
</style>

<!-- Selector -->
<select id="selector" class="form-select w-50 mx-auto m-2">
    <option>-- Selecciona una raza --</option>
</select>

<!-- Imagen -->
<img id="imagen" src="https://media.istockphoto.com/id/164006021/photo/rear-view-of-a-hairless-mixed-breed-dog-sitting.webp?b=1&s=170667a&w=0&k=20&c=zxjOA8EzJuN3Z8PFZiLOTlXreYi_UgP9Mi-Ky3ixyfQ=" alt="Imagen de perro">

<script>

    const btn = document.getElementById("btnAleatorio");
    const selector = document.getElementById("selector");
    const img = document.getElementById("imagen");

    // 🔹 1. BOTÓN ALEATORIO
    btn.addEventListener("click", () => {
        fetch("https://dog.ceo/api/breeds/image/random")
            .then(res => res.json())
            .then(data => {
                img.src = data.message;
            });
    });

    // 🔹 2. CARGAR LISTA DE RAZAS
    fetch("https://dog.ceo/api/breeds/list/all")
        .then(res => res.json())
        .then(data => {

            const razas = data.message;

            for (let raza in razas) {

                // Si NO tiene subrazas
                if (razas[raza].length === 0) {
                    let option = document.createElement("option");
                    option.value = raza;
                    option.text = raza;
                    selector.appendChild(option);
                }

                // Si tiene subrazas
                else {
                    razas[raza].forEach(subraza => {
                        let option = document.createElement("option");
                        option.value = `${raza}/${subraza}`;
                        option.text = `${raza} - ${subraza}`;
                        selector.appendChild(option);
                    });
                }
            }
        });

    // 🔹 3. CAMBIO EN SELECTOR
    selector.addEventListener("change", () => {

        let valor = selector.value;

        if (valor.includes("/")) {
            // Caso con subraza
            fetch(`https://dog.ceo/api/breed/${valor}/images/random`)
                .then(res => res.json())
                .then(data => {
                    img.src = data.message;
                });
        } else {
            // Caso simple
            fetch(`https://dog.ceo/api/breed/${valor}/images/random`)
                .then(res => res.json())
                .then(data => {
                    img.src = data.message;
                });
        }
    });

</script>

</body>
</html>
