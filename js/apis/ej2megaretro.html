<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario + Tabla + Array</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }

        tr:hover {
            background-color: #eeeeee;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Formulario</h2>

<form id="formulario">

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre"><br><br>

    <label for="apellidos">Apellidos:</label>
    <input type="text" id="apellidos"><br><br>

    <label for="edad">Edad:</label>
    <input type="number" id="edad"><br><br>

    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad"><br><br>

    <button type="submit">Añadir</button>
</form>

<h2>Tabla</h2>

<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>

    <tbody id="tablaDatos">
    </tbody>
</table>

<h2>Estadísticas</h2>

<p id="estadisticas"></p>

<script>

    $(document).ready(function(){

        // Array donde se guardan los datos
        var listaPersonas = [];

        $("#formulario").submit(function(e){
            e.preventDefault();

            // Recoger datos
            var nombre = $("#nombre").val();
            var apellidos = $("#apellidos").val();
            var edad = $("#edad").val();
            var ciudad = $("#ciudad").val();

            // Validar campos vacíos
            if (nombre === "") {
                alert("El campo nombre es obligatorio");
                return;
            }

            if (apellidos === "") {
                alert("El campo apellidos es obligatorio");
                return;
            }

            if (edad === "") {
                alert("El campo edad es obligatorio");
                return;
            }

            if (ciudad === "") {
                alert("El campo ciudad es obligatorio");
                return;
            }

            // Validar edad
            if (edad < 0) {
                alert("La edad no puede ser negativa");
                return;
            }

            // Crear objeto
            var persona = {
                nombre: nombre,
                apellidos: apellidos,
                edad: parseInt(edad),
                ciudad: ciudad
            };

            // Añadir al array
            listaPersonas.push(persona);

            // Serializar
            var jsonTexto = JSON.stringify(listaPersonas);

            // Generar tabla
            generarTabla(jsonTexto);

            // Calcular estadísticas
            calcularEstadisticas();

            // Limpiar formulario
            $("#formulario")[0].reset();
        });

        // Función que genera toda la tabla
        function generarTabla(json) {

            // Deserializar
            var lista = JSON.parse(json);

            // Limpiar tabla
            $("#tablaDatos").html("");

            // Recorrer array
            lista.forEach(function(persona, indice){

                var fila = generarTR(persona, indice);

                $("#tablaDatos").append(fila);
            });
        }

        // Función que crea un TR
        function generarTR(persona, indice) {

            var tr = $("<tr>");

            tr.append($("<td>").text(persona.nombre));
            tr.append($("<td>").text(persona.apellidos));
            tr.append($("<td>").text(persona.edad));
            tr.append($("<td>").text(persona.ciudad));

            // Click para borrar
            tr.click(function(){

                // Borrar del array usando índice
                listaPersonas.splice(indice, 1);

                // Eliminar fila
                $(this).remove();

                // Volver a serializar
                var jsonTexto = JSON.stringify(listaPersonas);

                // Regenerar tabla
                generarTabla(jsonTexto);

                // Recalcular estadísticas
                calcularEstadisticas();
            });

            return tr;
        }

        // Función estadísticas
        function calcularEstadisticas() {

            if (listaPersonas.length === 0) {
                $("#estadisticas").text("No hay datos");
                return;
            }

            var suma = 0;
            var max = listaPersonas[0].edad;
            var min = listaPersonas[0].edad;

            for (var i = 0; i < listaPersonas.length; i++) {

                var edad = listaPersonas[i].edad;

                suma += edad;

                if (edad > max) {
                    max = edad;
                }

                if (edad < min) {
                    min = edad;
                }
            }

            var media = suma / listaPersonas.length;

            $("#estadisticas").html(
                "Suma = " + suma + "<br>" +
                "Media = " + media.toFixed(2) + "<br>" +
                "Máximo = " + max + "<br>" +
                "Mínimo = " + min
            );

            console.log("Suma:", suma);
            console.log("Media:", media);
            console.log("Máximo:", max);
            console.log("Mínimo:", min);
        }

    });

</script>

</body>
</html>
