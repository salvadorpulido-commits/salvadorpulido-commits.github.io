<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario JSON Tabla</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Introducir datos</h2>

<form id="formulario">
    Nombre: <input type="text" id="nombre"><br><br>
    Apellidos: <input type="text" id="apellidos"><br><br>
    Edad: <input type="number" id="edad"><br><br>
    Ciudad: <input type="text" id="ciudad"><br><br>

    <button type="submit">Mostrar en tabla</button>
</form>

<h2>Tabla de datos</h2>

<table border="1">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td id="tdNombre"></td>
        <td id="tdApellidos"></td>
        <td id="tdEdad"></td>
        <td id="tdCiudad"></td>
    </tr>
    </tbody>
</table>

<script>

    $(document).ready(function(){

        $("#formulario").submit(function(e){
            e.preventDefault();

            // Recoger datos
            var nombre = $("#nombre").val();
            var apellidos = $("#apellidos").val();
            var edad = $("#edad").val();
            var ciudad = $("#ciudad").val();

            // VALIDACIÓN EDAD
            if (edad < 0) {
                alert("La edad no puede ser negativa");
                return;
            }

            // Crear objeto
            var persona = {
                nombre: nombre,
                apellidos: apellidos,
                edad: edad,
                ciudad: ciudad
            };

            // Serializar
            var jsonTexto = JSON.stringify(persona);
            console.log("JSON:", jsonTexto);

            // Deserializar
            var objeto = JSON.parse(jsonTexto);
            console.log("Objeto:", objeto);

            // Insertar en la ÚNICA fila (sobrescribe)
            $("#tdNombre").text(objeto.nombre);
            $("#tdApellidos").text(objeto.apellidos);
            $("#tdEdad").text(objeto.edad);
            $("#tdCiudad").text(objeto.ciudad);

            // Limpiar formulario
            $("#formulario")[0].reset();
        });

    });

</script>

</body>
</html>
